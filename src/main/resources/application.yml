server:
  port: ${PORT:8082}

spring:
  application:
    name: ebooks-catalog-service

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/catalog_db}
    username: ${SPRING_DATASOURCE_USERNAME:ebooks}
    password: ${SPRING_DATASOURCE_PASSWORD:ebooks_secret}

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration

  elasticsearch:
    uris: ${SPRING_ELASTICSEARCH_URIS:http://localhost:9200}

  rabbitmq:
    host: ${SPRING_RABBITMQ_HOST:localhost}
    port: ${SPRING_RABBITMQ_PORT:5672}
    username: ${SPRING_RABBITMQ_USERNAME:ebooks}
    password: ${SPRING_RABBITMQ_PASSWORD:ebooks_secret}
    virtual-host: ${SPRING_RABBITMQ_VIRTUAL_HOST:/}

  data:
    redis:
      url: ${SPRING_DATA_REDIS_URL:redis://localhost:6379}

  cache:
    type: redis
    redis:
      time-to-live: 300000  # 5 minutes

  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

minio:
  endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
  access-key: ${MINIO_ACCESS_KEY:ebooks_admin}
  secret-key: ${MINIO_SECRET_KEY:ebooks_secret_123}
  bucket: ${MINIO_BUCKET:ebooks-covers}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
